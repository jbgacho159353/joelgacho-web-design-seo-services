<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 — Page Not Found | Joel Gacho</title>
    <meta name="description" content="The page you're looking for has drifted off course. Head back to Joel Gacho's homepage." />
    <meta name="robots" content="noindex, follow" />

    <!-- Apply saved theme before paint to avoid a flash -->
    <script>
      (function () {
        try {
          document.documentElement.setAttribute(
            'data-theme',
            localStorage.getItem('pixlurk-theme') || 'dark'
          );
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <!-- ═══ GOOGLE FONTS ═══ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500;600&family=Rajdhani:wght@600;700&display=swap"
      rel="stylesheet"
    />

    <!-- ═══ FAVICON ═══ -->
    <link rel="icon" type="image/webp" href="assets/joel-gacho-favicon.webp" />
    <link rel="apple-touch-icon" href="assets/joelgacho-favicon.png" />

    <!-- ═══ STYLESHEET ═══ -->
    <link rel="stylesheet" href="css/style.css?v=19" />

    <!-- ═══ 404-ONLY STYLES ═══ -->
    <style>
      /* Screen-reader-only text (not defined in style.css) */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @property --nf-ang {
        syntax: '<angle>';
        initial-value: 0deg;
        inherits: false;
      }

      .nf {
        position: relative;
        min-height: calc(100dvh - 72px);
        display: grid;
        place-items: center;
        text-align: center;
        padding: 56px 20px 90px;
        overflow: hidden;
      }
      /* Soft accent glow backdrop */
      .nf::before {
        content: '';
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse 62% 52% at 50% 36%,
          var(--accent-glow) 0%,
          transparent 62%
        );
        pointer-events: none;
        z-index: 0;
      }
      /* Faint fading grid */
      .nf::after {
        content: '';
        position: absolute;
        inset: 0;
        background-image: linear-gradient(var(--border) 1px, transparent 1px),
          linear-gradient(90deg, var(--border) 1px, transparent 1px);
        background-size: 56px 56px;
        -webkit-mask-image: radial-gradient(ellipse 72% 64% at 50% 40%, #000 0%, transparent 76%);
        mask-image: radial-gradient(ellipse 72% 64% at 50% 40%, #000 0%, transparent 76%);
        opacity: 0.55;
        pointer-events: none;
        z-index: 0;
      }

      /* Floating ambient orbs */
      .nf__orb {
        position: absolute;
        border-radius: 50%;
        background: var(--gradient);
        opacity: 0.16;
        filter: blur(9px);
        z-index: 1;
        animation: nf-float 10s ease-in-out infinite;
      }
      .nf__orb--1 { width: 120px; height: 120px; top: 13%; left: 11%; animation-delay: 0s; }
      .nf__orb--2 { width: 82px;  height: 82px;  bottom: 17%; right: 13%; animation-delay: 1.6s; }
      .nf__orb--3 { width: 48px;  height: 48px;  top: 26%; right: 21%; animation-delay: 3.1s; }
      .nf__orb--4 { width: 66px;  height: 66px;  bottom: 22%; left: 19%; animation-delay: 2.2s; }
      @keyframes nf-float {
        0%, 100% { transform: translateY(0); }
        50%      { transform: translateY(-22px); }
      }

      .nf__inner {
        position: relative;
        z-index: 2;
        max-width: 760px;
      }

      .nf__eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 9px;
        font-family: 'Rajdhani', sans-serif;
        font-weight: 700;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        font-size: 0.8rem;
        color: var(--accent);
        padding: 7px 16px;
        border: 1px solid var(--border);
        border-radius: 50px;
        background: var(--accent-glow);
        margin-bottom: 26px;
      }
      .nf__eyebrow span {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--accent);
        box-shadow: 0 0 10px var(--accent);
        animation: nf-pulse 1.8s ease-in-out infinite;
      }
      @keyframes nf-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%      { opacity: 0.4; transform: scale(0.7); }
      }

      /* Giant 4 0 4 */
      .nf__code {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: clamp(4px, 1.6vw, 18px);
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        line-height: 0.85;
        margin: 4px 0 6px;
        will-change: transform;
        transition: transform 0.18s ease-out;
        filter: drop-shadow(0 18px 46px var(--accent-glow));
      }
      .nf__digit {
        font-size: clamp(110px, 27vw, 280px);
        background: linear-gradient(
          100deg,
          var(--accent) 0%,
          var(--accent-light) 45%,
          var(--accent) 90%
        );
        background-size: 220% 100%;
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
        animation: nf-sheen 5s ease-in-out infinite;
      }
      @keyframes nf-sheen {
        0%, 100% { background-position: 0% 50%; }
        50%      { background-position: 100% 50%; }
      }

      /* The "0" — a glowing orbital portal */
      .nf__zero {
        position: relative;
        width: clamp(96px, 23vw, 236px);
        height: clamp(96px, 23vw, 236px);
        border-radius: 50%;
        display: inline-grid;
        place-items: center;
        isolation: isolate;
      }
      .nf__zero::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: conic-gradient(
          from var(--nf-ang),
          transparent 0deg 48deg,
          var(--accent) 92deg,
          var(--accent-light) 112deg,
          transparent 160deg 360deg
        );
        animation: nf-spin 4.5s linear infinite;
        filter: drop-shadow(0 0 16px var(--accent-glow));
      }
      .nf__zero::after {
        content: '';
        position: absolute;
        inset: clamp(13px, 3.4vw, 30px);
        border-radius: 50%;
        background: var(--bg-primary);
        box-shadow: inset 0 0 0 1px var(--border);
      }
      @keyframes nf-spin { to { --nf-ang: 360deg; } }

      /* Orbiting planet around the portal */
      .nf__orbit {
        position: absolute;
        inset: -7%;
        border-radius: 50%;
        z-index: 3;
        animation: nf-orbit 4.5s linear infinite;
      }
      .nf__planet {
        position: absolute;
        top: 0;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(12px, 2.4vw, 18px);
        height: clamp(12px, 2.4vw, 18px);
        border-radius: 50%;
        background: var(--accent-light);
        box-shadow: 0 0 18px 2px var(--accent);
      }
      @keyframes nf-orbit { to { transform: rotate(360deg); } }

      .nf__title {
        font-family: 'Syne', sans-serif;
        font-weight: 800;
        font-size: clamp(1.5rem, 4.4vw, 2.4rem);
        color: var(--text-primary);
        margin: 14px 0 14px;
        line-height: 1.2;
      }
      .nf__text {
        color: var(--text-secondary);
        font-size: clamp(1rem, 2.5vw, 1.1rem);
        line-height: 1.7;
        max-width: 520px;
        margin: 0 auto 34px;
      }
      .nf__actions {
        display: flex;
        gap: 14px;
        justify-content: center;
        flex-wrap: wrap;
      }
      .nf__links {
        margin-top: 32px;
        display: flex;
        gap: 10px 22px;
        justify-content: center;
        flex-wrap: wrap;
        font-size: 0.9rem;
      }
      .nf__links a {
        color: var(--text-secondary);
        text-decoration: none;
        transition: color 0.2s;
      }
      .nf__links a:hover { color: var(--accent); }

      @media (prefers-reduced-motion: reduce) {
        .nf__digit,
        .nf__zero::before,
        .nf__orbit,
        .nf__orb,
        .nf__eyebrow span { animation: none !important; }
        .nf__code { transition: none !important; }
      }
    </style>
  </head>

  <body>
    <!-- ═══ HEADER ═══ -->
    <header class="site-header" id="siteHeader" role="banner">
      <nav class="nav container" aria-label="Primary navigation">
        <div class="nav__actions" style="margin-left: auto;">
          <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark/light mode" title="Toggle theme">
            <svg class="icon icon--sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <circle cx="12" cy="12" r="5" />
              <line x1="12" y1="1" x2="12" y2="3" />
              <line x1="12" y1="21" x2="12" y2="23" />
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
              <line x1="1" y1="12" x2="3" y2="12" />
              <line x1="21" y1="12" x2="23" y2="12" />
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
            </svg>
            <svg class="icon icon--moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
            </svg>
          </button>
        </div>
      </nav>
    </header>

    <!-- ═══ 404 ═══ -->
    <main>
      <section class="nf" aria-labelledby="nf-title">
        <span class="nf__orb nf__orb--1" aria-hidden="true"></span>
        <span class="nf__orb nf__orb--2" aria-hidden="true"></span>
        <span class="nf__orb nf__orb--3" aria-hidden="true"></span>
        <span class="nf__orb nf__orb--4" aria-hidden="true"></span>

        <div class="nf__inner">
          <span class="nf__eyebrow"><span aria-hidden="true"></span>Error 404</span>

          <span class="sr-only">404 — Page not found.</span>
          <div class="nf__code" data-parallax aria-hidden="true">
            <span class="nf__digit">4</span>
            <span class="nf__zero">
              <span class="nf__orbit"><span class="nf__planet"></span></span>
            </span>
            <span class="nf__digit">4</span>
          </div>

          <h1 class="nf__title" id="nf-title">This page drifted off course.</h1>
          <p class="nf__text">
            The page you're looking for doesn't exist, was moved, or never made it
            to launch. Let's steer you back to solid ground.
          </p>

          <div class="nf__actions">
            <a href="index.html" class="btn btn--primary">Back to Homepage</a>
            <a href="index.html#projects" class="btn btn--outline">View My Work</a>
          </div>

          <nav class="nf__links" aria-label="Quick links">
            <a href="index.html#about">About</a>
            <a href="index.html#services">Services</a>
            <a href="index.html#skills">Skills</a>
            <a href="blog.html">Blog</a>
            <a href="index.html#contact">Contact</a>
          </nav>
        </div>
      </section>
    </main>

    <!-- ═══ THEME TOGGLE + PARALLAX ═══ -->
    <script>
      (function () {
        var THEME_KEY = 'pixlurk-theme';
        var html = document.documentElement;
        var btn = document.getElementById('themeToggle');
        if (btn) {
          btn.addEventListener('click', function () {
            var next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', next);
            try { localStorage.setItem(THEME_KEY, next); } catch (e) {}
          });
        }

        var cluster = document.querySelector('[data-parallax]');
        var reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        if (cluster && !reduce) {
          window.addEventListener('pointermove', function (e) {
            var x = e.clientX / window.innerWidth - 0.5;
            var y = e.clientY / window.innerHeight - 0.5;
            cluster.style.transform = 'translate(' + (x * 20).toFixed(1) + 'px,' + (y * 20).toFixed(1) + 'px)';
          }, { passive: true });
        }
      })();
    </script>
  </body>
</html>
